<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Artikel | Admin PlayPass</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    
    <style>
        body { background-color: var(--bg-dark); margin: 0; display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background-color: var(--bg-card); border-right: 1px solid #2A3241; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 100;}
        .sidebar-logo { padding: 25px 20px; font-size: 24px; font-weight: bold; color: var(--text-main); text-decoration: none; border-bottom: 1px solid #2A3241; margin-bottom: 20px; }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-menu { list-style: none; padding: 0 15px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-menu li a { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background-color: var(--accent); color: white; }
        .sidebar-footer { margin-top: auto; padding: 20px 15px; border-top: 1px solid #2A3241; }
        .btn-logout { width: 100%; padding: 10px; background-color: transparent; color: #EF4444; border: 1px solid #EF4444; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background-color: #EF4444; color: white; }

        .admin-main { flex: 1; margin-left: 260px; padding: 30px 40px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-header h1 { font-size: 2rem; color: var(--text-main); margin: 0; }

        .editor-container-wrapper { background-color: var(--bg-card); border: 1px solid #2A3241; border-radius: 12px; padding: 30px; }
        .form-row { display: flex; gap: 20px; }
        .form-group { margin-bottom: 20px; flex: 1; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.95rem; font-weight: 600; }
        .form-input { width: 100%; padding: 12px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; font-size: 1rem; }
        .form-input:focus { border-color: var(--accent); }
        select.form-input { cursor: pointer; }

        .ql-toolbar.ql-snow { border: 1px solid #2A3241; background-color: var(--bg-dark); border-top-left-radius: 8px; border-top-right-radius: 8px; }
        .ql-container.ql-snow { border: 1px solid #2A3241; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; background-color: var(--bg-dark); color: var(--text-main); font-size: 1.1rem; min-height: 400px; }
        .ql-snow .ql-stroke { stroke: var(--text-muted); }
        .ql-snow .ql-fill { fill: var(--text-muted); }
        .ql-snow .ql-picker { color: var(--text-muted); }

        .action-bar { display: flex; justify-content: flex-end; gap: 15px; margin-top: 30px; border-top: 1px solid #2A3241; padding-top: 20px; }
        .btn { padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-outline { background: transparent; border: 1px solid #2A3241; color: var(--text-muted); }
        .btn-outline:hover { background: #2A3241; color: white; }
        .btn-primary { background: var(--accent); border: none; color: white; }
        .btn-primary:hover { background: var(--accent-hover); }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <a href="index.html" class="sidebar-logo">Play<span>Pass</span> <span style="font-size: 0.8rem; color: white;">ADMIN</span></a>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="kelola-transaksi.html">🛒 Kelola Transaksi</a></li>
            <li><a href="kelola-produk.html">📦 Kelola Produk</a></li>
            <li><a href="kelola-artikel.html" class="active">📝 Kelola Artikel</a></li>
            <li><a href="kelola-pengguna.html">👥 Kelola Pengguna</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="window.location.href='index.html'">🚪 Keluar</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Edit Artikel</h1>
        </header>

        <form class="editor-container-wrapper" onsubmit="updateArticle(event)">
            <div class="form-group">
                <label>Judul Artikel</label>
                <input type="text" id="postTitle" class="form-input" required value="Update Patch 1.8.44 Mobile Legends: Hero Ini Kena Nerf Parah!">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Penulis</label>
                    <input type="text" id="postAuthor" class="form-input" required value="Admin PlayPass">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="postCat" class="form-input">
                        <option value="Berita" selected>Berita</option>
                        <option value="Tips & Trik">Tips & Trik</option>
                        <option value="Promo">Promo</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Gambar Banner Utama (URL)</label>
                <input type="text" id="postBanner" class="form-input" value="https://images.unsplash.com/photo-1542751371-adc38448a05e">
            </div>

            <div class="form-group">
                <label>Isi Artikel</label>
                <div id="quillEditor"></div>
            </div>

            <div class="form-row" style="margin-top: 20px;">
                <div class="form-group" style="flex: 0.3;">
                    <label>Status</label>
                    <select id="postStatus" class="form-input">
                        <option value="Diterbitkan" selected>Diterbitkan</option>
                        <option value="Draft">Ubah ke Draft</option>
                    </select>
                </div>
            </div>

            <div class="action-bar">
                <button type="button" class="btn btn-outline" onclick="window.location.href='kelola-artikel.html'">Batal</button>
                <button type="submit" class="btn btn-primary">🔄 Perbarui Artikel</button>
            </div>
        </form>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#quillEditor', {
            theme: 'snow',
            modules: {
                toolbar: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],        
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],     
                    ['link', 'image', 'video'],                       
                    ['clean']                                         
                ]
            }
        });

        const kontenLama = `
            <p>Moonton baru saja merilis patch terbaru 1.8.44. Patch kali ini membawa perubahan besar pada sistem META (Most Effective Tactics Available) yang sebelumnya didominasi oleh hero-hero bertipe <em>Support Healer</em>.</p>
            <h3>Hero yang Terkena Nerf (Penurunan Kekuatan)</h3>
            <ul>
                <li><strong>Joy:</strong> <em>Cooldown</em> dari <em>Ultimate</em>-nya kini diperpanjang.</li>
                <li><strong>Mathilda:</strong> Rasio <em>Shield</em> dikurangi 20%.</li>
            </ul>
        `;
        quill.root.innerHTML = kontenLama;

        function updateArticle(event) {
            event.preventDefault();
            const title = document.getElementById('postTitle').value;
            
            if (quill.getText().trim() === '') {
                alert('Isi artikel tidak boleh kosong!');
                return;
            }

            alert(`Berhasil! Artikel "${title}" telah diperbarui.\n\n(Anda akan dialihkan kembali ke daftar artikel).`);
            window.location.href = 'kelola-artikel.html';
        }
    </script>
</body>
</html>
