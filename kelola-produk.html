<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Produk | Admin PlayPass</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--bg-dark); margin: 0; display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background-color: var(--bg-card); border-right: 1px solid #2A3241; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 100;}
        .sidebar-logo { padding: 25px 20px; font-size: 24px; font-weight: bold; color: var(--text-main); text-decoration: none; border-bottom: 1px solid #2A3241; margin-bottom: 20px; }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-menu { list-style: none; padding: 0 15px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-menu li a { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background-color: var(--accent); color: white; }
        .sidebar-footer { margin-top: auto; padding: 20px 15px; border-top: 1px solid #2A3241; }
        .btn-logout { width: 100%; padding: 10px; background-color: transparent; color: #EF4444; border: 1px solid #EF4444; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background-color: #EF4444; color: white; }

        .admin-main { flex: 1; margin-left: 260px; padding: 30px 40px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-header h1 { font-size: 2rem; color: var(--text-main); margin: 0; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid #2A3241; }
        .search-box { display: flex; gap: 10px; flex: 1; max-width: 500px; }
        .search-box input { flex: 1; padding: 10px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; }
        .search-box input:focus { border-color: var(--accent); }
        .filter-select { padding: 10px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; cursor: pointer; }

        .btn-add { background-color: var(--accent); color: white; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background-color: var(--accent-hover); }

        .alpha-filter { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .alpha-btn { padding: 8px 12px; background-color: var(--bg-card); border: 1px solid #2A3241; color: var(--text-muted); border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; min-width: 35px; text-align: center; }
        .alpha-btn:hover, .alpha-btn.active { background-color: var(--accent); color: white; border-color: var(--accent); }

        .table-container { background-color: var(--bg-card); border: 1px solid #2A3241; border-radius: 12px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; border-bottom: 2px solid #2A3241; color: var(--text-muted); font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #2A3241; color: var(--text-main); vertical-align: middle; }
        tr:hover td { background-color: rgba(124, 58, 237, 0.05); }

        .product-info { display: flex; align-items: center; gap: 15px; }
        .product-info img { width: 60px; height: 60px; border-radius: 8px; object-fit: contain; background-color: #F8FAFC; border: 1px solid #2A3241; padding: 5px; }
        .product-info div h4 { margin: 0 0 5px 0; font-size: 1.05rem; color: var(--text-main); }
        .product-info div p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }

        .badge-admin { padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .badge-active { background-color: rgba(16, 185, 129, 0.15); color: #10B981; }
        .badge-inactive { background-color: rgba(239, 68, 68, 0.15); color: #EF4444; }

        .action-btns { display: flex; gap: 10px; }
        .btn-act { padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .btn-edit { background-color: rgba(124, 58, 237, 0.15); color: var(--accent); border: 1px solid rgba(124, 58, 237, 0.3); }
        .btn-edit:hover { background-color: var(--accent); color: white; }
        .btn-delete { background-color: rgba(239, 68, 68, 0.15); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-delete:hover { background-color: #EF4444; color: white; }

        .crud-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(11, 15, 25, 0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .crud-modal-content { background-color: var(--bg-card); width: 90%; max-width: 500px; border-radius: 12px; border: 1px solid #2A3241; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 30px; }
        .crud-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #2A3241; padding-bottom: 15px; }
        .crud-modal-header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 12px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; }
        .form-input:focus { border-color: var(--accent); }
        select.form-input { cursor: pointer; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <a href="index.html" class="sidebar-logo">Play<span>Pass</span> <span style="font-size: 0.8rem; color: white;">ADMIN</span></a>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="kelola-transaksi.html">🛒 Kelola Transaksi</a></li>
            <li><a href="kelola-produk.html" class="active">📦 Kelola Produk</a></li>
            <li><a href="kelola-artikel.html">📝 Kelola Artikel</a></li>
            <li><a href="kelola-pengguna.html">👥 Kelola Pengguna</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="window.location.href='index.html'">🚪 Keluar</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Kelola Produk Game</h1>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchProduct" placeholder="Cari nama game..." oninput="renderTable()">
                <select id="filterCategory" class="filter-select" onchange="renderTable()">
                    <option value="all">Semua Kategori</option>
                    <option value="Mobile Game">Mobile Game</option>
                    <option value="PC Game">PC Game</option>
                    <option value="Voucher Digital">Voucher Digital</option>
                </select>
            </div>
            <button class="btn-add" onclick="openAddModal()">
                <span>➕</span> Tambah Game
            </button>
        </div>

        <div class="alpha-filter" id="alphaFilterContainer">
            </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Info Game</th>
                        <th>Kategori</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="crudModal" class="crud-modal">
        <div class="crud-modal-content">
            <div class="crud-modal-header">
                <h2 id="modalTitle">Tambah Game Baru</h2>
                <button class="btn-act btn-delete" onclick="closeModal()" style="padding: 5px 10px;">✖</button>
            </div>
            <form id="crudForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="editIndex" value="-1">
                <div class="form-group">
                    <label>Nama Game</label>
                    <input type="text" id="inputName" class="form-input" required placeholder="Contoh: Mobile Legends">
                </div>
                <div class="form-group">
                    <label>Publisher</label>
                    <input type="text" id="inputPub" class="form-input" required placeholder="Contoh: Moonton">
                </div>
                <div class="form-group">
                    <label>URL Gambar</label>
                    <input type="text" id="inputImg" class="form-input" placeholder="assets/images/nama-file.png">
                </div>
                <div class="form-group">
                    <label>Kategori</label>
                    <select id="inputCat" class="form-input">
                        <option value="Mobile Game">Mobile Game</option>
                        <option value="PC Game">PC Game</option>
                        <option value="Voucher Digital">Voucher Digital</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select id="inputStatus" class="form-input">
                        <option value="Tersedia">Tersedia</option>
                        <option value="Gangguan">Gangguan Server</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let products = [
            { img: 'assets/images/mlbb.png', name: 'Mobile Legends: Bang Bang', pub: 'Moonton', cat: 'Mobile Game', status: 'Tersedia' },
            { img: 'assets/images/valo.png', name: 'Valorant', pub: 'Riot Games', cat: 'PC Game', status: 'Tersedia' },
            { img: 'assets/images/pubg.png', name: 'PUBG Mobile', pub: 'Tencent', cat: 'Mobile Game', status: 'Gangguan' },
            { img: 'assets/images/gopay.png', name: 'Saldo GoPay', pub: 'Gojek', cat: 'Voucher Digital', status: 'Tersedia' },
            { img: 'assets/images/ff.png', name: 'Free Fire', pub: 'Garena', cat: 'Mobile Game', status: 'Tersedia' },
            { img: 'assets/images/efb.png', name: 'eFootball', pub: 'Konami', cat: 'Mobile Game', status: 'Tersedia' }
        ];

        let activeAlphabet = 'all';

        const tableBody = document.getElementById('productTableBody');
        const modal = document.getElementById('crudModal');
        const crudForm = document.getElementById('crudForm');

        function renderAlphabetFilter() {
            const container = document.getElementById('alphaFilterContainer');
            container.innerHTML = `<button class="alpha-btn active" onclick="setAlphabet('all')">All</button>`;
            
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                container.innerHTML += `<button class="alpha-btn" onclick="setAlphabet('${letter}')">${letter}</button>`;
            }
        }

        function setAlphabet(letter) {
            activeAlphabet = letter;
            
            const buttons = document.querySelectorAll('.alpha-btn');
            buttons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === letter || (letter === 'all' && btn.innerText === 'All')) {
                    btn.classList.add('active');
                }
            });

            renderTable(); 
        }

        function renderTable() {
            const searchQuery = document.getElementById('searchProduct').value.toLowerCase();
            const categoryQuery = document.getElementById('filterCategory').value;
            tableBody.innerHTML = ''; 

            products.forEach((prod, index) => {
                // Logika Filter
                const matchSearch = prod.name.toLowerCase().includes(searchQuery) || prod.pub.toLowerCase().includes(searchQuery);
                const matchCategory = categoryQuery === 'all' || prod.cat === categoryQuery;
                const matchAlphabet = activeAlphabet === 'all' || prod.name.toUpperCase().startsWith(activeAlphabet);

                if (matchSearch && matchCategory && matchAlphabet) {
                    let statusBadge = prod.status === 'Tersedia' 
                        ? '<span class="badge-admin badge-active">Tersedia</span>' 
                        : '<span class="badge-admin badge-inactive">Gangguan Server</span>';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="product-info">
                                <img src="${prod.img}" alt="${prod.name}" onerror="this.src='https://via.placeholder.com/60?text=Game'">
                                <div>
                                    <h4 class="prod-name">${prod.name}</h4>
                                    <p class="prod-pub">${prod.pub}</p>
                                </div>
                            </div>
                        </td>
                        <td>${prod.cat}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-act btn-edit" onclick="openEditModal(${index})">Edit</button>
                                <button class="btn-act btn-delete" onclick="deleteProduct(${index})">Hapus</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tambah Game Baru";
            document.getElementById('editIndex').value = "-1"; 
            crudForm.reset(); 
            document.getElementById('inputImg').value = "assets/images/mlbb.png"; 
            modal.style.display = 'flex';
        }

        function openEditModal(index) {
            document.getElementById('modalTitle').innerText = "Edit Data Game";
            document.getElementById('editIndex').value = index; 
            const prod = products[index];
            document.getElementById('inputName').value = prod.name;
            document.getElementById('inputPub').value = prod.pub;
            document.getElementById('inputImg').value = prod.img;
            document.getElementById('inputCat').value = prod.cat;
            document.getElementById('inputStatus').value = prod.status;
            modal.style.display = 'flex';
        }

        function saveProduct(event) {
            event.preventDefault(); 
            const index = document.getElementById('editIndex').value;
            const newData = {
                name: document.getElementById('inputName').value,
                pub: document.getElementById('inputPub').value,
                img: document.getElementById('inputImg').value || 'https://via.placeholder.com/60?text=Game',
                cat: document.getElementById('inputCat').value,
                status: document.getElementById('inputStatus').value
            };
            if (index === "-1") {
                products.push(newData);
                alert("Game baru berhasil ditambahkan!");
            } else {
                products[index] = newData;
                alert("Data game berhasil diperbarui!");
            }
            closeModal();
            renderTable(); 
        }

        function deleteProduct(index) {
            const namaGame = products[index].name;
            if (confirm(`Apakah kamu yakin ingin menghapus "${namaGame}" secara permanen?`)) {
                products.splice(index, 1); 
                renderTable(); 
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        renderAlphabetFilter();
        renderTable();
    </script>
</body>
</html>
