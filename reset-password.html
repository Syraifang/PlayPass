<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buat Password Baru | PlayPass</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(16, 185, 129, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
            padding: 20px;
        }

        .auth-logo { font-size: 2.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; margin-bottom: 30px; letter-spacing: 1px; }
        .auth-logo span { color: var(--accent); }

        .auth-card {
            background-color: var(--bg-card); width: 100%; max-width: 400px; border-radius: 16px;
            border: 1px solid #2A3241; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { color: var(--text-main); font-size: 1.5rem; margin-bottom: 10px; }
        .auth-header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input {
            width: 100%; padding: 14px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241;
            border-radius: 8px; color: var(--text-main); outline: none; font-size: 1rem; transition: 0.3s;
        }
        .form-input:focus { border-color: #10B981; box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1); }

        .btn-auth {
            width: 100%; background-color: #10B981; color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-auth:hover { background-color: #059669; transform: translateY(-2px); }
    </style>
</head>
<body>

    <a href="index.html" class="auth-logo">Play<span>Pass</span></a>

    <div class="auth-card">
        <div class="auth-header">
            <h2>Buat Password Baru 🔑</h2>
            <p>Silakan masukkan kata sandi baru Anda. Pastikan kombinasi huruf dan angka agar lebih aman.</p>
        </div>

        <form onsubmit="handleNewPassword(event)">
            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="newPass" class="form-input" required placeholder="Minimal 8 karakter">
            </div>
            <div class="form-group">
                <label>Konfirmasi Password Baru</label>
                <input type="password" id="confirmPass" class="form-input" required placeholder="Ketik ulang password baru">
            </div>

            <button type="submit" class="btn-auth">Simpan & Masuk</button>
        </form>
    </div>

    <script>
        function handleNewPassword(event) {
            event.preventDefault(); 
            
            const pass1 = document.getElementById('newPass').value;
            const pass2 = document.getElementById('confirmPass').value;
            
            // Validasi Sederhana
            if(pass1 !== pass2) {
                alert("Gagal! Konfirmasi password tidak cocok. Silakan ketik ulang.");
                return;
            }
            
            if(pass1.length < 8) {
                alert("Gagal! Password harus minimal 8 karakter.");
                return;
            }

            alert("Berhasil! Password baru Anda telah disimpan.\n\nSilakan login menggunakan password baru.");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
