<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Artikel | Admin PlayPass</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: var(--bg-dark); margin: 0; display: flex; min-height: 100vh; }
        .admin-sidebar { width: 260px; background-color: var(--bg-card); border-right: 1px solid #2A3241; display: flex; flex-direction: column; position: fixed; height: 100vh; overflow-y: auto; z-index: 100;}
        .sidebar-logo { padding: 25px 20px; font-size: 24px; font-weight: bold; color: var(--text-main); text-decoration: none; border-bottom: 1px solid #2A3241; margin-bottom: 20px; }
        .sidebar-logo span { color: var(--accent); }
        .sidebar-menu { list-style: none; padding: 0 15px; display: flex; flex-direction: column; gap: 5px; }
        .sidebar-menu li a { display: flex; align-items: center; padding: 12px 15px; color: var(--text-muted); text-decoration: none; border-radius: 8px; font-weight: 500; transition: 0.3s; }
        .sidebar-menu li a:hover, .sidebar-menu li a.active { background-color: var(--accent); color: white; }
        .sidebar-footer { margin-top: auto; padding: 20px 15px; border-top: 1px solid #2A3241; }
        .btn-logout { width: 100%; padding: 10px; background-color: transparent; color: #EF4444; border: 1px solid #EF4444; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-logout:hover { background-color: #EF4444; color: white; }

        .admin-main { flex: 1; margin-left: 260px; padding: 30px 40px; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .admin-header h1 { font-size: 2rem; color: var(--text-main); margin: 0; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background-color: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid #2A3241; }
        .search-box { display: flex; gap: 10px; flex: 1; max-width: 500px; }
        .search-box input { flex: 1; padding: 10px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; }
        .search-box input:focus { border-color: var(--accent); }
        .filter-select { padding: 10px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; cursor: pointer; }

        .btn-add { background-color: var(--accent); color: white; padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-add:hover { background-color: var(--accent-hover); }

        .table-container { background-color: var(--bg-card); border: 1px solid #2A3241; border-radius: 12px; padding: 20px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; border-bottom: 2px solid #2A3241; color: var(--text-muted); font-weight: 600; }
        td { padding: 15px; border-bottom: 1px solid #2A3241; color: var(--text-main); vertical-align: middle; }
        tr:hover td { background-color: rgba(124, 58, 237, 0.05); }

        .article-info { display: flex; align-items: center; gap: 15px; }
        .article-info img { width: 80px; height: 50px; border-radius: 6px; object-fit: cover; border: 1px solid #2A3241; }
        .article-info div h4 { margin: 0 0 5px 0; font-size: 1.05rem; color: var(--text-main); max-width: 300px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .article-info div p { margin: 0; font-size: 0.85rem; color: var(--text-muted); }

        .badge-admin { padding: 5px 10px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; }
        .badge-published { background-color: rgba(16, 185, 129, 0.15); color: #10B981; }
        .badge-draft { background-color: rgba(245, 158, 11, 0.15); color: #F59E0B; }

        .action-btns { display: flex; gap: 10px; }
        .btn-act { padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .btn-edit { background-color: rgba(124, 58, 237, 0.15); color: var(--accent); border: 1px solid rgba(124, 58, 237, 0.3); }
        .btn-edit:hover { background-color: var(--accent); color: white; }
        .btn-delete { background-color: rgba(239, 68, 68, 0.15); color: #EF4444; border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-delete:hover { background-color: #EF4444; color: white; }

        .crud-modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(11, 15, 25, 0.85); backdrop-filter: blur(5px); justify-content: center; align-items: center; }
        .crud-modal-content { background-color: var(--bg-card); width: 90%; max-width: 600px; border-radius: 12px; border: 1px solid #2A3241; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); padding: 30px; }
        .crud-modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #2A3241; padding-bottom: 15px; }
        .crud-modal-header h2 { margin: 0; font-size: 1.5rem; color: var(--text-main); }
        .form-row { display: flex; gap: 15px; }
        .form-group { margin-bottom: 15px; flex: 1; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        .form-input { width: 100%; padding: 12px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241; border-radius: 8px; color: var(--text-main); outline: none; }
        .form-input:focus { border-color: var(--accent); }
        textarea.form-input { resize: vertical; min-height: 100px; }
        select.form-input { cursor: pointer; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; margin-top: 25px; }
    </style>
</head>
<body>

    <aside class="admin-sidebar">
        <a href="index.html" class="sidebar-logo">Play<span>Pass</span> <span style="font-size: 0.8rem; color: white;">ADMIN</span></a>
        <ul class="sidebar-menu">
            <li><a href="dashboard.html">📊 Dashboard</a></li>
            <li><a href="kelola-transaksi.html">🛒 Kelola Transaksi</a></li>
            <li><a href="kelola-produk.html">📦 Kelola Produk</a></li>
            <li><a href="kelola-artikel.html" class="active">📝 Kelola Artikel</a></li>
            <li><a href="kelola-pengguna.html">👥 Kelola Pengguna</a></li>
        </ul>
        <div class="sidebar-footer">
            <button class="btn-logout" onclick="window.location.href='index.html'">🚪 Keluar</button>
        </div>
    </aside>

    <main class="admin-main">
        <header class="admin-header">
            <h1>Kelola Artikel & Promo</h1>
        </header>

        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchArticle" placeholder="Cari judul artikel atau penulis..." oninput="renderTable()">
                <select id="filterCategory" class="filter-select" onchange="renderTable()">
                    <option value="all">Semua Kategori</option>
                    <option value="Berita">Berita</option>
                    <option value="Tips & Trik">Tips & Trik</option>
                    <option value="Promo">Promo</option>
                </select>
            </div>
            <button class="btn-add" onclick="window.location.href='create-artikel.html'">
                <span>➕</span> Tulis Artikel
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Judul Artikel</th>
                        <th>Kategori</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="articleTableBody">
                    </tbody>
            </table>
        </div>
    </main>

    <div id="crudModal" class="crud-modal">
        <div class="crud-modal-content">
            <div class="crud-modal-header">
                <h2 id="modalTitle">Tulis Artikel Baru</h2>
                <button class="btn-act btn-delete" onclick="closeModal()" style="padding: 5px 10px;">✖</button>
            </div>
            <form id="crudForm" onsubmit="saveArticle(event)">
                <input type="hidden" id="editIndex" value="-1">
                
                <div class="form-group">
                    <label>Judul Artikel</label>
                    <input type="text" id="inputTitle" class="form-input" required placeholder="Contoh: Update Patch Terbaru Mobile Legends">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Penulis</label>
                        <input type="text" id="inputAuthor" class="form-input" required placeholder="Contoh: Admin">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="inputCat" class="form-input">
                            <option value="Berita">Berita</option>
                            <option value="Tips & Trik">Tips & Trik</option>
                            <option value="Promo">Promo</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>URL Gambar Banner</label>
                    <input type="text" id="inputImg" class="form-input" placeholder="https://images.unsplash.com/...">
                </div>

                <div class="form-group">
                    <label>Ringkasan Isi (Excerpt)</label>
                    <textarea id="inputExcerpt" class="form-input" required placeholder="Tulis sedikit ringkasan untuk memancing pembaca..."></textarea>
                </div>

                <div class="form-group">
                    <label>Status Publikasi</label>
                    <select id="inputStatus" class="form-input">
                        <option value="Diterbitkan">Diterbitkan</option>
                        <option value="Draft">Simpan sebagai Draft</option>
                    </select>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-outline" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan Artikel</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let articles = [
            { img: 'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=200', title: 'Update Patch 1.8.44 Mobile Legends: Hero Ini Kena Nerf Parah!', author: 'Admin PlayPass', cat: 'Berita', excerpt: 'Moonton baru saja merilis patch terbaru yang mengubah META secara drastis.', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1538481199705-c710c4e965fc?w=200', title: '5 Settingan Crosshair Valorant Terbaik ala Pro Player VCT 2026', author: 'Editor PlayPass', cat: 'Tips & Trik', excerpt: 'Ingin aim kamu setajam TenZ? Cobain 5 kode crosshair rahasia ini.', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1605901309584-818e25960b8f?w=200', title: 'Flash Sale Akhir Bulan! Top Up UC PUBG Mobile Cashback 50%', author: 'Tim Promo', cat: 'Promo', excerpt: 'Jangan sampai ketinggalan event Flash Sale bulan ini. Kuota terbatas!', status: 'Diterbitkan' },
            { img: 'assets/images/pengumuman.jpg', title: 'Pengumuman Maintenance!!!!', author: 'Admin', cat: 'Berita', excerpt: 'Info Maintenance', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=200', title: 'PBocoran Karakter Baru Genshin Impact Region Natlan', author: 'Admin PlayPass', cat: 'Berita', excerpt: 'Para leaker kembali beraksi. Intip siluet dan elemen dari karakter terbaru...', status: 'Draft' },
            { img: 'https://images.unsplash.com/photo-1552820728-8b83bb6b773f?w=200', title: 'Panduan Build Item Honor of Kings (HoK) Untuk Pemula', author: 'ProPlayer99', cat: 'Tips & Trik', excerpt: 'Baru main HoK? Jangan asal beli item! Simak panduan lengkap build core hero di sini.', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1607082348824-0a96f2a4b9da?w=200', title: 'Spesial Liburan: Diskon Top Up Diamond MLBB & Free Fire', author: 'Tim Promo', cat: 'Promo', excerpt: 'Nikmati potongan harga hingga 30% untuk semua denom besar khusus minggu ini.', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1493711662062-fa541abbe5de?w=200', title: 'Review eFootball 2026: Engine Baru Makin Realistis?', author: 'Editor PlayPass', cat: 'Berita', excerpt: 'Konami memberikan update grafis besar-besaran. Apakah gameplay-nya juga membaik?', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1563191911-e65f8655ebf9?w=200', title: 'Cara Cepat Naik Rank Heroic di Free Fire Tanpa Cheat', author: 'GamerSejati', cat: 'Tips & Trik', excerpt: 'Bosan stuck di tier bawah? Terapkan 3 strategi rotasi ini agar gampang Booyah.', status: 'Draft' },
            { img: 'https://images.unsplash.com/photo-1580327332925-a10e6cb11baa?w=200', title: 'Kolaborasi Epik PUBG Mobile x Anime Terkenal Bulan Depan', author: 'Admin PlayPass', cat: 'Berita', excerpt: 'Tencent resmi mengumumkan kolaborasi terbarunya yang akan membawa skin eksklusif.', status: 'Diterbitkan' },
            { img: 'https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8?w=200', title: 'Bonus Saldo GoPay 50 Ribu Setiap Transaksi Pertama', author: 'Tim Promo', cat: 'Promo', excerpt: 'Daftar akun PlayPass sekarang dan dapatkan langsung cashback saldo GoPay!', status: 'Diterbitkan' }
        ];

        const tableBody = document.getElementById('articleTableBody');
        const modal = document.getElementById('crudModal');
        const crudForm = document.getElementById('crudForm');

        function renderTable() {
            const searchQuery = document.getElementById('searchArticle').value.toLowerCase();
            const categoryQuery = document.getElementById('filterCategory').value;
            tableBody.innerHTML = ''; 

            articles.forEach((art, index) => {
                const matchSearch = art.title.toLowerCase().includes(searchQuery) || art.author.toLowerCase().includes(searchQuery);
                const matchCategory = categoryQuery === 'all' || art.cat === categoryQuery;

                if (matchSearch && matchCategory) {
                    let statusBadge = art.status === 'Diterbitkan' 
                        ? '<span class="badge-admin badge-published">Diterbitkan</span>' 
                        : '<span class="badge-admin badge-draft">Draft</span>';

                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>
                            <div class="article-info">
                                <img src="${art.img}" alt="Thumbnail" onerror="this.src='https://via.placeholder.com/80x50?text=No+Image'">
                                <div>
                                    <h4 title="${art.title}">${art.title}</h4>
                                    <p>Oleh: ${art.author}</p>
                                </div>
                            </div>
                        </td>
                        <td>${art.cat}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-act btn-edit" onclick="openEditModal(${index})">Edit</button>
                                <button class="btn-act btn-delete" onclick="deleteArticle(${index})">Hapus</button>
                            </div>
                        </td>
                    `;
                    tableBody.appendChild(tr);
                }
            });
        }

        function openAddModal() {
            document.getElementById('modalTitle').innerText = "Tulis Artikel Baru";
            document.getElementById('editIndex').value = "-1"; 
            crudForm.reset(); 
            modal.style.display = 'flex';
        }

        function openEditModal(index) {
            window.location.href = 'edit-artikel.html';
            document.getElementById('editIndex').value = index; 
            
            const art = articles[index];
            document.getElementById('inputTitle').value = art.title;
            document.getElementById('inputAuthor').value = art.author;
            document.getElementById('inputImg').value = art.img;
            document.getElementById('inputCat').value = art.cat;
            document.getElementById('inputExcerpt').value = art.excerpt;
            document.getElementById('inputStatus').value = art.status;

            modal.style.display = 'flex';
        }

        function saveArticle(event) {
            event.preventDefault(); 
            const index = document.getElementById('editIndex').value;
            const newData = {
                title: document.getElementById('inputTitle').value,
                author: document.getElementById('inputAuthor').value,
                img: document.getElementById('inputImg').value || 'https://via.placeholder.com/80x50?text=Article',
                cat: document.getElementById('inputCat').value,
                excerpt: document.getElementById('inputExcerpt').value,
                status: document.getElementById('inputStatus').value
            };

            if (index === "-1") {
                articles.unshift(newData); // Tambahkan ke urutan paling atas
                alert("Artikel baru berhasil ditambahkan!");
            } else {
                articles[index] = newData;
                alert("Artikel berhasil diperbarui!");
            }

            closeModal();
            renderTable(); 
        }

        function deleteArticle(index) {
            const title = articles[index].title;
            if (confirm(`Apakah kamu yakin ingin menghapus artikel "${title}"?`)) {
                articles.splice(index, 1); 
                renderTable(); 
            }
        }

        function closeModal() { modal.style.display = 'none'; }

        renderTable();
    </script>
</body>
</html>
