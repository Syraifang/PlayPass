<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk / Daftar | PlayPass</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(124, 58, 237, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
            padding: 20px;
        }

        .auth-logo {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }
        .auth-logo span { color: var(--accent); }

        .auth-card {
            background-color: var(--bg-card);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            border: 1px solid #2A3241;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #2A3241;
        }
        .auth-tab {
            flex: 1;
            text-align: center;
            padding-bottom: 15px;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .auth-tab.active { color: var(--accent); }
        .auth-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 2px;
            background-color: var(--accent);
        }

        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .form-input {
            width: 100%;
            padding: 14px 15px;
            background-color: var(--bg-dark);
            border: 1px solid #2A3241;
            border-radius: 8px;
            color: var(--text-main);
            outline: none;
            font-size: 1rem;
            transition: 0.3s;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }

        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }
        .auth-options label { color: var(--text-muted); display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .auth-options input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
        .auth-options a { color: var(--accent); text-decoration: none; transition: 0.2s; }
        .auth-options a:hover { color: var(--text-main); }

        .btn-auth {
            width: 100%;
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-auth:hover { background-color: var(--accent-hover); transform: translateY(-2px); }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 25px 0;
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #2A3241;
        }
        .auth-divider:not(:empty)::before { margin-right: .25em; }
        .auth-divider:not(:empty)::after { margin-left: .25em; }

        .social-login-container {
            display: flex;
            gap: 15px;
        }
        .btn-social {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            border: 1px solid #2A3241;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-social:hover { border-color: var(--text-muted); background-color: rgba(255, 255, 255, 0.05); }
        .btn-social img { width: 20px; height: 20px; }

        .back-home {
            margin-top: 30px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .back-home:hover { color: var(--text-main); }
    </style>
</head>
<body>

    <a href="index.html" class="auth-logo">Play<span>Pass</span></a>

    <div class="auth-card">
        
        <div class="auth-tabs">
            <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Masuk</div>
            <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Daftar</div>
        </div>

        <form id="formLogin" class="auth-form active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" class="form-input" required placeholder="Masukkan email kamu">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" class="form-input" required placeholder="Masukkan password">
            </div>
            
            <div class="auth-options">
                <label><input type="checkbox"> Ingat Saya</label>
                <a href="lupa-password.html">Lupa Password?</a>
            </div>

            <button type="submit" class="btn-auth">Masuk Sekarang</button>
        </form>

        <form id="formRegister" class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" class="form-input" required placeholder="Contoh: Budi Santoso">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-input" required placeholder="Masukkan email aktif">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" class="form-input" required placeholder="Buat password (min 8 karakter)">
            </div>

            <button type="submit" class="btn-auth">Buat Akun Baru</button>
            
            <p style="text-align: center; margin-top: 15px; font-size: 0.8rem; color: var(--text-muted);">
                Dengan mendaftar, kamu menyetujui <a href="#" style="color: var(--accent);">Syarat & Ketentuan</a>.
            </p>
        </form>

        <div class="auth-divider">ATAU LANJUTKAN DENGAN</div>
        
        <div class="social-login-container">
            <button class="btn-social" onclick="simulateSocialLogin('Google')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google">
                Google
            </button>
            <button class="btn-social" onclick="simulateSocialLogin('Facebook')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook">
                Facebook
            </button>
        </div>

    </div>

    <a href="index.html" class="back-home">⬅ Kembali ke Beranda</a>

    <script>
        function switchTab(tabName) {
            const tabLogin = document.getElementById('tabLogin');
            const tabRegister = document.getElementById('tabRegister');
            const formLogin = document.getElementById('formLogin');
            const formRegister = document.getElementById('formRegister');

            if (tabName === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formLogin.classList.add('active');
                formRegister.classList.remove('active');
            } else {
                tabRegister.classList.add('active');
                tabLogin.classList.remove('active');
                formRegister.classList.add('active');
                formLogin.classList.remove('active');
            }
        }

        function handleLogin(event) {
            event.preventDefault(); 
            const email = document.getElementById('loginEmail').value.toLowerCase();
            
            if (email === 'admin@m') {
                alert('Selamat datang kembali, Super Admin!');
                window.location.href = 'dashboard.html'; 
            } else {
                alert('Login Berhasil! Selamat berbelanja.');
                window.location.href = 'index.html'; 
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            alert('Pendaftaran berhasil! Silakan masuk menggunakan akun baru kamu.');
            switchTab('login'); 
        }

        function simulateSocialLogin(provider) {
            alert(`Mengarahkan ke halaman otentikasi ${provider}... \n\n(Otentikasi berhasil! Mengalihkan kembali ke Beranda PlayPass.)`);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
