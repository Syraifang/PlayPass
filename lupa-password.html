<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | PlayPass</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at top right, rgba(124, 58, 237, 0.15), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.1), transparent 40%);
            padding: 20px;
        }

        .auth-logo { font-size: 2.5rem; font-weight: 800; color: var(--text-main); text-decoration: none; margin-bottom: 30px; letter-spacing: 1px; }
        .auth-logo span { color: var(--accent); }

        .auth-card {
            background-color: var(--bg-card); width: 100%; max-width: 400px; border-radius: 16px;
            border: 1px solid #2A3241; padding: 40px 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            position: relative; overflow: hidden;
        }

        .auth-header { text-align: center; margin-bottom: 30px; }
        .auth-header h2 { color: var(--text-main); font-size: 1.5rem; margin-bottom: 10px; }
        .auth-header p { color: var(--text-muted); font-size: 0.9rem; line-height: 1.5; }

        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-muted); font-size: 0.9rem; }
        
        .form-input {
            width: 100%; padding: 14px 15px; background-color: var(--bg-dark); border: 1px solid #2A3241;
            border-radius: 8px; color: var(--text-main); outline: none; font-size: 1rem; transition: 0.3s;
        }
        .form-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.1); }
        
        .input-otp { text-align: center; font-size: 1.5rem; letter-spacing: 5px; font-weight: bold; }

        .btn-auth {
            width: 100%; background-color: var(--accent); color: white; border: none; padding: 14px;
            border-radius: 8px; font-size: 1.05rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-auth:hover { background-color: var(--accent-hover); transform: translateY(-2px); }

        .back-home { margin-top: 30px; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .back-home:hover { color: var(--text-main); }

        .step-container { display: none; animation: fadeInRight 0.4s ease; }
        .step-container.active { display: block; }

        @keyframes fadeInRight {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .timer-text { text-align: center; margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .timer-text span { font-weight: bold; color: var(--text-main); }
        .resend-link { color: var(--text-muted); text-decoration: none; cursor: default; pointer-events: none; transition: 0.2s; font-weight: bold;}
        .resend-link.active { color: var(--accent); cursor: pointer; pointer-events: auto; }
        .resend-link.active:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <a href="index.html" class="auth-logo">Play<span>Pass</span></a>

    <div class="auth-card">
        
        <div id="step1" class="step-container active">
            <div class="auth-header">
                <h2>Lupa Password? 🔒</h2>
                <p>Masukkan alamat email yang terhubung, dan kami akan mengirimkan kode OTP untuk mereset kata sandimu.</p>
            </div>
            <form onsubmit="handleSendOTP(event)">
                <div class="form-group">
                    <label>Email Terdaftar</label>
                    <input type="email" id="resetEmail" class="form-input" required placeholder="Contoh: budi@gmail.com">
                </div>
                <button type="submit" class="btn-auth">Kirim Kode OTP</button>
            </form>
        </div>

        <div id="step2" class="step-container">
            <div class="auth-header">
                <h2>Verifikasi OTP ✉️</h2>
                <p>Kami telah mengirimkan 6 digit kode OTP ke email <strong id="displayEmail" style="color:var(--text-main);"></strong>.</p>
            </div>
            <form onsubmit="handleVerifyOTP(event)">
                <div class="form-group">
                    <label style="text-align: center;">Masukkan 6 Digit OTP</label>
                    <input type="text" id="inputOTP" class="form-input input-otp" required maxlength="6" pattern="\d{6}" title="Masukkan 6 digit angka" placeholder="••••••" autocomplete="off">
                </div>
                <button type="submit" class="btn-auth">Verifikasi & Lanjut</button>
                
                <div class="timer-text">
                    Kode hangus dalam <span id="timeDisplay">05:00</span><br><br>
                    Belum menerima email? <a class="resend-link" id="resendBtn" onclick="resendOTP()">Kirim Ulang OTP</a>
                </div>
            </form>
        </div>

    </div>

    <a href="login.html" class="back-home">⬅ Kembali ke Halaman Login</a>

    <script>
        let timerInterval;

        function handleSendOTP(event) {
            event.preventDefault(); 
            const email = document.getElementById('resetEmail').value;
            
            document.getElementById('displayEmail').innerText = email;
            alert(`[SIMULASI SISTEM]\n\nKode OTP 6-Digit telah dikirim ke:\n${email}`);
            
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            // Timer OTP
            startTimer(5);
            document.getElementById('inputOTP').focus();
        }

        function handleVerifyOTP(event) {
            event.preventDefault();
            const otp = document.getElementById('inputOTP').value;
            
            if (otp === "123456") {
                alert("Verifikasi Berhasil! OTP Valid.");
                window.location.href = 'reset-password.html';
            } else {
                alert("Gagal! Kode OTP salah. Silakan periksa kembali email Anda.");
                document.getElementById('inputOTP').value = "";
            }
        }

        function startTimer(duration) {
            let timer = duration, minutes, seconds;
            const display = document.getElementById('timeDisplay');
            const resendBtn = document.getElementById('resendBtn');
            
            resendBtn.classList.remove('active');
            resendBtn.innerText = "Kirim Ulang OTP";

            clearInterval(timerInterval);

            timerInterval = setInterval(function () {
                minutes = parseInt(timer / 60, 10);
                seconds = parseInt(timer % 60, 10);

                minutes = minutes < 10 ? "0" + minutes : minutes;
                seconds = seconds < 10 ? "0" + seconds : seconds;

                display.textContent = minutes + ":" + seconds;

                if (--timer < 0) {
                    clearInterval(timerInterval);
                    display.textContent = "00:00";
                    resendBtn.classList.add('active');
                }
            }, 1000);
        }

        function resendOTP() {
            alert("Kode OTP baru telah dikirim ulang ke email Anda!");
            document.getElementById('inputOTP').value = "";
            startTimer(300);
        }
    </script>
</body>
</html>
